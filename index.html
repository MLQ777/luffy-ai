<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルフィとの航海</title>
<style>
body{margin:0;padding:0;font-family:sans-serif;background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh}
#app{width:400px;height:600px;background:#fff8e1;border-radius:16px;display:flex;flex-direction:column;overflow:hidden;position:relative}
#header{background:#d32f2f;color:#fff;padding:16px;text-align:center;font-weight:bold;font-size:18px}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
#input-area{padding:12px;display:flex;gap:8px;border-top:1px solid #ddd;background:#fff}
#input-area input{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
#input-area button{width:42px;height:42px;border:none;border-radius:50%;background:#d32f2f;color:#fff;font-size:18px;cursor:pointer}
.msg{padding:10px 14px;border-radius:10px;max-width:80%;line-height:1.6;animation:fadeIn .3s}
.msg.luffy{background:#fff;color:#333;align-self:flex-start;border:1px solid #eee;border-radius:4px 10px 10px 10px}
.msg.user{background:#0d47a1;color:#fff;align-self:flex-end;border-radius:10px 4px 10px 10px}
.msg .cn{display:block;margin-top:4px;padding-top:4px;border-top:1px dashed rgba(0,0,0,.1);font-size:12px;color:#999}
@keyframes fadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.music-btn{position:fixed;bottom:20px;right:20px;width:44px;height:44px;background:#d32f2f;border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;z-index:100;box-shadow:0 3px 12px rgba(211,47,47,.4)}
</style>
</head>
<body>
<div id="app">
<div id="header">ルフィとの航海</div>
<div id="chat"><div id="empty" style="text-align:center;color:#999;margin-top:100px"><p>海贼王になる男と冒険の旅に出かけよう!</p></div></div>
<div id="input-area"><input id="msgInput" placeholder="ルフィに話しかける..." autocomplete="off"><button id="sendBtn">>></button></div>
</div>
<audio id="binksAudio" preload="auto" src="https://music.163.com/song/media/outer/url?id=4950184.mp3" loop></audio>
<button class="music-btn" id="musicBtn" onclick="toggleMusic()">♪</button>
<script>
var API_ENDPOINT = "https://api.deepseek.com/chat/completions";
var SYSTEM_PROMPT = "あなたはモンキー・D・ルフィです。海賊王になる男です。一人称は「おれ」、タメ口で話し、語尾は「だ！」「ぞ！」を使います。よく笑います「ししし！」。日本語で話した後、かならず「」でくくって中国語訳を付け加えてください。";

var messages = [{role:"system", content: SYSTEM_PROMPT}];
var isProcessing = false;
var chat = document.getElementById("chat");
var empty = document.getElementById("empty");
var input = document.getElementById("msgInput");
var send = document.getElementById("sendBtn");

function addMsg(role, content) {
  empty.style.display = "none";
  var div = document.createElement("div");
  div.className = "msg " + role;
  var idx = content.lastIndexOf("「");
  if (idx >= 0 && role === "assistant") {
    var jp = content.substring(0, idx).trim();
    var cn = content.substring(idx);
    div.innerHTML = jp + "<span class="cn">" + cn + "</span>";
  } else {
    div.textContent = content;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
  var text = input.value.trim();
  if (!text || isProcessing) return;
  input.value = "";
  isProcessing = true;
  send.disabled = true;
  messages.push({role:"user", content: text});
  addMsg("user", text);
  var xhr = new XMLHttpRequest();
  xhr.open("POST", API_ENDPOINT, true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.onload = function() {
    try {
      var data = JSON.parse(xhr.responseText);
      var reply = data.choices[0].message.content;
      messages.push({role:"assistant", content: reply});
      addMsg("assistant", reply);
    } catch(e) {
      addMsg("assistant", "Error: " + e.message);
    }
    isProcessing = false;
    send.disabled = false;
    input.focus();
  };
  xhr.onerror = function() {
    addMsg("assistant", "Network error - check console");
    isProcessing = false;
    send.disabled = false;
  };
  xhr.send(JSON.stringify({model:"deepseek-chat",messages:messages,temperature:0.9,max_tokens:1500}));
}

send.addEventListener("click", sendMessage);
input.addEventListener("keydown", function(e) {if(e.key==="Enter") sendMessage();});

setTimeout(function() {
  var g = "ししし！おれはルフィ！海賊王になる男だ！お前、新しい仲間か？名前は？ワクワクすんぞ！！\n「嘻嘻嘻！我是路飞！是要成为海贼王的男人！你是新伙伴吗？叫什么名字？好兴奋啊！！」";
  messages.push({role:"assistant", content: g});
  addMsg("assistant", g);
}, 1500);

var isPlaying = false;
var audio = document.getElementById("binksAudio");
function toggleMusic() {
  if (isPlaying) {audio.pause(); isPlaying = false;}
  else {audio.play().then(function(){isPlaying=true;}).catch(function(){});}
}
document.addEventListener("click", function() {
  if (audio && !isPlaying) {
    audio.play().then(function(){isPlaying=true;}).catch(function(){});
  }
}, {once: true});

var timer = null;
function resetTimer() {
  if (timer) clearTimeout(timer);
  timer = setTimeout(proactiveMsg, 30000);
}
function proactiveMsg() {
  if (isProcessing || messages.length <= 1) return;
  var prompts = ["なあなあ、次の島はどんな島かな！","肉食いてェ〜！","ゾロはまた寝てるかな？","海軍の奴ら、何か企んでるかもな…"];
  var pick = prompts[Math.floor(Math.random()*prompts.length)];
  var xhr2 = new XMLHttpRequest();
  xhr2.open("POST", API_ENDPOINT, true);
  xhr2.setRequestHeader("Content-Type", "application/json");
  xhr2.onload = function() {
    try {
      var data2 = JSON.parse(xhr2.responseText);
      var reply2 = data2.choices[0].message.content;
      messages.push({role:"assistant", content: reply2});
      addMsg("assistant", reply2);
    } catch(e) {}
  };
  xhr2.send(JSON.stringify({model:"deepseek-chat",messages:messages.concat([{role:"user",content:pick}]),temperature:0.9,max_tokens:1000}));
}
document.addEventListener("click", resetTimer);
document.addEventListener("keydown", resetTimer);
resetTimer();
</script>
</body>
</html>
