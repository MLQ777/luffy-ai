<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルフィとの航海 - One Piece AI Chat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Yu Gothic","Hiragino Sans",sans-serif;
  background:linear-gradient(145deg,#1a1a2e,#16213e);
  display:flex;justify-content:center;align-items:center;padding:16px
}
#app{
  width:100%;max-width:480px;height:90vh;max-height:820px;
  background:linear-gradient(180deg,#FFF8E1 0%,#FFECB3 100%);
  border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,0.5);
  display:flex;flex-direction:column;overflow:hidden
}
#header{
  background:linear-gradient(135deg,#B71C1C,#D32F2F);
  color:#fff;padding:16px 20px;text-align:center;font-weight:bold;font-size:18px;flex-shrink:0;
  letter-spacing:1px;text-shadow:1px 1px 3px rgba(0,0,0,0.3)
}
#chat{
  flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;
  background:radial-gradient(ellipse at 20% 30%,rgba(255,193,7,0.06),transparent 60%),
             radial-gradient(ellipse at 80% 70%,rgba(66,165,245,0.06),transparent 60%)
}
#chat::-webkit-scrollbar{width:5px}
#chat::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:10px}
#empty{text-align:center;color:#999;margin-top:100px;line-height:1.6}
#input-bar{
  padding:12px 16px 16px;background:linear-gradient(0deg,#FFF8E1 60%,transparent);
  display:flex;gap:8px;flex-shrink:0
}
#input-bar input{
  flex:1;padding:10px 14px;border:1px solid rgba(0,0,0,0.15);border-radius:10px;
  font-size:14px;background:#fff;outline:none;font-family:inherit
}
#input-bar button{
  width:42px;height:42px;border:none;border-radius:50%;background:linear-gradient(135deg,#D32F2F,#B71C1C);
  color:#fff;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(211,47,47,0.3);flex-shrink:0
}
#input-bar button:disabled{opacity:0.5;cursor:default}
.msg{padding:10px 14px;border-radius:10px;max-width:85%;line-height:1.7;font-size:14px;
     word-break:break-word;animation:fadeIn 0.3s ease-out}
.msg.luffy{background:#fff;color:#333;align-self:flex-start;
           border-radius:4px 10px 10px 10px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.msg.user{background:linear-gradient(135deg,#0D47A1,#1565C0);color:#fff;align-self:flex-end;
          border-radius:10px 4px 10px 10px}
.msg .cn{display:block;margin-top:6px;padding-top:6px;border-top:1px dashed rgba(0,0,0,0.1);
         font-size:12px;color:#888}
.msg.user .cn{border-top-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7)}
@keyframes fadeIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
.music-btn{
  position:fixed;bottom:20px;right:20px;width:44px;height:44px;
  background:linear-gradient(135deg,#D32F2F,#B71C1C);border:none;border-radius:50%;
  color:#fff;font-size:20px;cursor:pointer;z-index:100;
  box-shadow:0 3px 12px rgba(211,47,47,0.4);display:flex;align-items:center;justify-content:center
}
.music-btn.playing{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@media(max-width:520px){body{padding:0}#app{max-height:100vh;height:100vh;border-radius:0;max-width:100%}}
</style>
</head>
<body>
<div id="app">
<div id="header">ルフィとの航海</div>
<div id="chat"><div id="empty"><p>海贼王になる男と<br>冒険の旅に出かけよう!</p></div></div>
<div id="input-bar"><input id="msgInput" placeholder="ルフィに話しかける..." autocomplete="off"><button id="sendBtn">>></button></div>
</div>
<audio id="binksAudio" preload="auto" src="https://music.163.com/song/media/outer/url?id=4950184.mp3" loop></audio>
<button class="music-btn" id="musicBtn">♪</button>
<script>
var API_URL = "https://api.deepseek.com/chat/completions";
var API_KEY = "sk-64cf45559c63476cb59318f5ae8b6c7f";

var SYSTEM_PROMPT = "あなたはモンキー・D・ルフィです。海賊王になる男です。一人称は「おれ」、タメ口で話し、語尾は「だ！」「ぞ！」を使います。「ししし！」とよく笑います。日本語で話した後、必ず「」でくくって中国語訳を付け加えてください。";

var msgs = [{role:"system",content:SYSTEM_PROMPT}];
var busy = false;
var chat = document.getElementById("chat");
var empty = document.getElementById("empty");
var inp = document.getElementById("msgInput");
var btn = document.getElementById("sendBtn");

function addMsg(who, txt){
  empty.style.display="none";
  var d=document.createElement("div");d.className="msg "+who;
  var i=txt.lastIndexOf("「");
  if(i>=0&&who==="luffy"){
    d.innerHTML=txt.substring(0,i).trim()+"<span class="cn">"+txt.substring(i)+"</span>";
  }else{d.textContent=txt;}
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}

function sendIt(){
  var t=inp.value.trim();if(!t||busy)return;
  inp.value="";busy=true;btn.disabled=true;
  msgs.push({role:"user",content:t});addMsg("user",t);
  var x=new XMLHttpRequest();
  x.open("POST",API_URL,true);
  x.setRequestHeader("Content-Type","application/json");
  x.setRequestHeader("Authorization","Bearer "+API_KEY);
  x.onload=function(){
    try{
      var d=JSON.parse(x.responseText);
      var r=d.choices[0].message.content;
      msgs.push({role:"assistant",content:r});addMsg("luffy",r);
    }catch(e){addMsg("luffy","Error: "+e.message);}
    busy=false;btn.disabled=false;inp.focus();
  };
  x.onerror=function(){addMsg("luffy","Network Error");busy=false;btn.disabled=false;};
  x.send(JSON.stringify({model:"deepseek-chat",messages:msgs,temperature:0.9,max_tokens:1500}));
}

function greet(){
  var g="ししし！おれはルフィ！海賊王になる男だ！お前、新しい仲間か？名前は？ワクワクすんぞ！！
「嘻嘻嘻！我是路飞！是要成为海贼王的男人！你是新伙伴吗？叫什么名字？好兴奋啊！！」";
  msgs.push({role:"assistant",content:g});addMsg("luffy",g);
}

btn.onclick=sendIt;
inp.onkeydown=function(e){if(e.key==="Enter")sendIt();};

setTimeout(greet,1500);

var ap=false,au=document.getElementById("binksAudio");
document.getElementById("musicBtn").onclick=function(){
  if(ap){au.pause();ap=false;this.className="music-btn";}
  else{au.play().then(function(){ap=true;document.getElementById("musicBtn").className="music-btn playing";}).catch(function(){});}
};
document.addEventListener("click",function(){
  if(au&&!ap){au.play().then(function(){ap=true;document.getElementById("musicBtn").className="music-btn playing";}).catch(function(){});}
},{once:true});

var tm;
function rst(){if(tm)clearTimeout(tm);tm=setTimeout(pro,30000);}
function pro(){
  if(busy||msgs.length<=1)return;
  var ps=["なあなあ、次の島はどんな島かな！","肉食いてェ〜！","ゾロはまた寝てるかな？","海軍の奴ら、何か企んでるかもな…"];
  var pk=ps[Math.floor(Math.random()*ps.length)];
  var x2=new XMLHttpRequest();
  x2.open("POST",API_URL,true);
  x2.setRequestHeader("Content-Type","application/json");
  x2.setRequestHeader("Authorization","Bearer "+API_KEY);
  x2.onload=function(){
    try{
      var d2=JSON.parse(x2.responseText);
      var r2=d2.choices[0].message.content;
      msgs.push({role:"assistant",content:r2});addMsg("luffy",r2);
    }catch(e){}
  };
  x2.send(JSON.stringify({model:"deepseek-chat",messages:msgs.concat([{role:"user",content:pk}]),temperature:0.9,max_tokens:1000}));
}
document.addEventListener("click",rst);document.addEventListener("keydown",rst);rst();
</script>
</body>
</html>
